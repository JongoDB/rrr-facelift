# Self-hosted services for the RRR automation platform.
# Reachable from the public internet only via Cloudflare Tunnel — no inbound ports on the VM.
# Spec: planning/10-infrastructure.md

name: rrr

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rrr}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-rrr}"]
      interval: 10s
      timeout: 5s
      retries: 10

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-rrr}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST:-flows.triple-r-rv.com}
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://flows.triple-r-rv.com/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_RUNNERS_ENABLED: "true"
      GENERIC_TIMEZONE: ${TIMEZONE:-America/New_York}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    expose:
      - "5678"

  speaches:
    # CPU variant by default. Switch to ":latest-cuda" + uncomment the deploy section
    # below on hosts with an NVIDIA GPU. Spec: planning/10-infrastructure.md.
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    restart: unless-stopped
    environment:
      WHISPER__MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-medium.en}
      WHISPER__COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
    volumes:
      - speaches_models:/root/.cache/huggingface
    expose:
      - "8000"
    # GPU host? Switch the image tag above and uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - n8n
      - speaches
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    expose:
      - "80"
      - "443"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - caddy

  ollama:
    profiles: ["with-ollama"]
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"

volumes:
  pgdata:
  n8n_data:
  speaches_models:
  caddy_data:
  caddy_config:
  ollama_data:
